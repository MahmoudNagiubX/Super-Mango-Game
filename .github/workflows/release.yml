name: Publish Windows Demo

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag using semantic versioning, for example v1.1.0
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  package-and-release:
    name: Package and publish Windows demo
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use semantic versioning, for example v1.1.0."
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build portable Windows package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          GAME_DIR="Super Mango Game Main"
          PACKAGE_DIR="Super-Mango-Windows-$VERSION"
          ASSET_NAME="$PACKAGE_DIR.zip"

          test -f "$GAME_DIR/main.exe"
          test -d "$GAME_DIR/resources"

          mkdir -p "$PACKAGE_DIR"
          cp "$GAME_DIR/main.exe" "$PACKAGE_DIR/SuperMango.exe"
          cp -R "$GAME_DIR/resources" "$PACKAGE_DIR/resources"
          cp "$GAME_DIR/LICENSE.txt" "$PACKAGE_DIR/LICENSE.txt"

          for runtime_file in libgcc_s_dw2-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            if [ -f "$GAME_DIR/$runtime_file" ]; then
              cp "$GAME_DIR/$runtime_file" "$PACKAGE_DIR/"
            fi
          done

          cat > "$PACKAGE_DIR/README.txt" <<'EOF'
          SUPER MANGO — WINDOWS DEMO

          How to run:
          1. Extract the complete ZIP archive.
          2. Keep SuperMango.exe, the resources folder, and the DLL files together.
          3. Run SuperMango.exe.

          Controls:
          A           Move left
          D           Move right
          Left Shift  Sprint
          Space       Jump
          Escape      Pause or resume
          Q           Return to the menu while paused

          Repository:
          https://github.com/MahmoudNagiubX/Super-Mango-Game
          EOF

          zip -r "$ASSET_NAME" "$PACKAGE_DIR"
          echo "asset=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"

          cat > release-notes.md <<EOF
          ## Super Mango $VERSION — Windows Demo

          A playable Windows build of **Super Mango**, a 2D platformer developed with C++ and raylib.

          ### Included
          - Two complete side-scrolling levels
          - Movement, sprinting, jumping, health, lives, and scoring
          - Birds, spiders, flame hazards, spikes, falls, and moving saws
          - Menu, controls screen, pause flow, game-over sequence, and ending scene
          - Required textures, audio, fonts, and available runtime DLLs

          ### Run the game
          1. Download the attached ZIP file.
          2. Extract the complete archive.
          3. Run \`SuperMango.exe\`.

          Keep the executable, DLL files, and \`resources\` directory together.
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          ASSET="${{ steps.package.outputs.asset }}"
          TITLE="Super Mango $VERSION — Windows Demo"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$ASSET" --clobber
            gh release edit "$VERSION" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$VERSION" "$ASSET" \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --latest
          fi
