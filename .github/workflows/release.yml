name: Publish Windows Demo

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (for example v1.1.0)
        required: true
        default: v1.0.0
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  package-and-release:
    name: Package and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="v1.0.0"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use semantic versioning, for example v1.0.0."
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build portable Windows package
        id: package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          PACKAGE_DIR="Super-Mango-Windows-$VERSION"
          ASSET_NAME="$PACKAGE_DIR.zip"
          GAME_DIR="Super Mango Game Main"

          test -f "$GAME_DIR/main.exe"
          test -d "$GAME_DIR/resources"

          mkdir -p "$PACKAGE_DIR"
          cp "$GAME_DIR/main.exe" "$PACKAGE_DIR/SuperMango.exe"
          cp -R "$GAME_DIR/resources" "$PACKAGE_DIR/resources"
          cp "$GAME_DIR/LICENSE.txt" "$PACKAGE_DIR/LICENSE.txt"

          if [ -f "$GAME_DIR/libgcc_s_dw2-1.dll" ]; then
            cp "$GAME_DIR/libgcc_s_dw2-1.dll" "$PACKAGE_DIR/"
          fi

          if [ -f "$GAME_DIR/libstdc++-6.dll" ]; then
            cp "$GAME_DIR/libstdc++-6.dll" "$PACKAGE_DIR/"
          fi

          cat > "$PACKAGE_DIR/README.txt" <<'EOF'
          SUPER MANGO — WINDOWS DEMO

          1. Extract the complete ZIP archive.
          2. Keep SuperMango.exe, the resources folder, and the DLL files together.
          3. Run SuperMango.exe.

          Controls:
          A          Move left
          D          Move right
          Left Shift Sprint
          Space      Jump
          Escape     Pause or resume
          Q          Return to menu while paused

          Repository:
          https://github.com/MahmoudNagiubX/Super-Mango-Game
          EOF

          zip -r "$ASSET_NAME" "$PACKAGE_DIR"

          echo "asset=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          cat > release-notes.md <<EOF
          ## 🥭 Super Mango $VERSION — Windows Demo

          This release packages the current playable version of **Super Mango**, a 2D platformer built with C++ and raylib.

          ### Included
          - Two complete platforming levels
          - Player movement, sprinting, jumping, health, lives, and scoring
          - Birds, spiders, flame hazards, spikes, and moving saws
          - Main menu, controls screen, pause flow, game-over sequence, and ending scene
          - Music, sound effects, textures, fonts, and required runtime files

          ### How to play
          1. Download the ZIP asset attached to this release.
          2. Extract the complete archive.
          3. Run \`SuperMango.exe\` inside the extracted folder.

          > Keep the executable, DLL files, and \`resources\` directory together.

          **Platform:** Windows  
          **Status:** Playable demo
          EOF

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ASSET="${{ steps.package.outputs.asset }}"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" "$ASSET" --clobber
            gh release edit "$VERSION" \
              --title "Super Mango $VERSION — Windows Demo" \
              --notes-file release-notes.md \
              --latest
          else
            gh release create "$VERSION" "$ASSET" \
              --target "$GITHUB_SHA" \
              --title "Super Mango $VERSION — Windows Demo" \
              --notes-file release-notes.md \
              --latest
          fi
