# Packages the existing Windows executable and runtime resources into a GitHub Release.
name: Publish Windows Demo

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (for example v1.1.0)
        required: true
        default: v1.0.0
  push:
    branches:
      - main
    paths:
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  package-and-release